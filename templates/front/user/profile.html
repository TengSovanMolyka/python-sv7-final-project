<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LBS | My Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='front/styles.css') }}">
</head>

<body class="bg-light">

{% include 'front/share/navbar.html' %}

<section class="profile-section">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-6">
        <div class="profile-card bg-white shadow-sm rounded-4 p-5">

          <!-- TITLE -->
          <div class="text-center mb-4">
            <h1 class="fw-bold">My Account 👤</h1>
            <p class="text-muted">Manage your La Beauté Studio profile</p>
          </div>

          <!-- USER INFO -->
          <ul class="list-group mb-4">
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Full Name</span>
              <span>{{ user.full_name }}</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Username</span>
              <span>{{ user.username }}</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Email</span>
              <span>{{ user.email }}</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span class="fw-semibold">Phone</span>
              <span>{{ user.phone }}</span>
            </li>
          </ul>

          <!-- ACTIONS -->
          <div class="d-grid gap-3">
            <a href="/edit-profile" class="btn btn-outline-dark rounded-3">Edit Profile</a>
            <a href="/orders" class="btn btn-outline-success rounded-3">View Orders</a>
            <a href="/logout" class="btn btn-dark rounded-3">Logout</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

{% include 'front/share/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
